services:
  postgres:
    image: postgres:17-alpine
    container_name: cast-canvas-lab-postgres
    environment:
      POSTGRES_DB: cast_canvas_lab
      POSTGRES_USER: castcanvas
      POSTGRES_PASSWORD: castcanvas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U castcanvas -d cast_canvas_lab"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cast-canvas-lab-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
