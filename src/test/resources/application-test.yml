spring:
  datasource:
    url: jdbc:h2:mem:castcanvaslab;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  data:
    redis:
      repositories:
        enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

app:
  security:
    jwt:
      issuer: castcanvaslab-test
      secret: test-secret-key-that-is-at-least-32-bytes-long-for-hmac-sha256
      access-token-expiration-seconds: 3600
      refresh-token-expiration-seconds: 604800
