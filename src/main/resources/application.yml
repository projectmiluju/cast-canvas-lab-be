spring:
  application:
    name: cast-canvas-lab-be
  config:
    import: optional:classpath:application-local-secret.yml
  profiles:
    default: local
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:cast_canvas_lab}
    username: ${DB_USERNAME:castcanvas}
    password: ${DB_PASSWORD:castcanvas}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /docs/swagger-ui
  api-docs:
    path: /docs/api

logging:
  level:
    org.springframework.security: INFO

app:
  security:
    jwt:
      issuer: castcanvaslab
      secret: ${JWT_SECRET:change-me-in-local}
      access-token-expiration-seconds: 3600
      refresh-token-expiration-seconds: 604800
